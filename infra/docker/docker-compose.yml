name: intelligence-os

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: torilaure_security
      POSTGRES_USER: torilaure
      POSTGRES_PASSWORD: torilaure
    volumes:
      - torilaure-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  platform-core:
    image: 7nepalithito/intelligence-os-platform-core:latest
    build:
      context: ../../platform-core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://torilaure:torilaure@postgres:5432/torilaure_security
      REDIS_URL: redis://redis:6379/0
      BOOTSTRAP_AUTH_USERS: "true"
      BOOTSTRAP_SAMPLE_DATA: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend-app:
    image: 7nepalithito/intelligence-os-frontend-app:latest
    build:
      context: ../../frontend-app
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - platform-core

volumes:
  torilaure-postgres-data:
