name: intelligence-os

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - torilaure-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  platform-core:
    image: 7nepalithito/intelligence-os-platform-core:latest
    build:
      context: ../../platform-core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app_user:change-me-local-dev@postgres:5432/app_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BOOTSTRAP_AUTH_USERS: "false"
      BOOTSTRAP_SAMPLE_DATA: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-app:
    image: 7nepalithito/intelligence-os-frontend-app:latest
    build:
      context: ../../frontend-app
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - platform-core

volumes:
  torilaure-postgres-data:
